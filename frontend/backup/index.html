<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Tag Editor</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <div class="app-logo">
                    <img src="logo.png" alt="Logo">
                </div>
                <div class="header-info">
                    <h1>Music Tag Editor</h1>
                    <span id="mountpoint-label">Connecting...</span>
                </div>
            </div>
            <div class="header-right">
                <div class="search-bar">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    <input type="text" id="search-input" placeholder="Search files...">
                </div>
                <div class="status-indicator">
                    <span class="status-dot"></span>
                    <span id="status-text">Connecting...</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="app-main">
            <!-- File Explorer -->
            <div class="file-explorer">
                <div class="explorer-toolbar">
                    <div class="toolbar-left">
                        <button class="toolbar-btn" id="back-btn" disabled>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M19 12H5M12 19l-7-7 7-7"/>
                            </svg>
                        </button>
                        <button class="toolbar-btn" id="up-btn" disabled>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 19V5M5 12l7-7 7 7"/>
                            </svg>
                        </button>
                        <button class="toolbar-btn" id="refresh-btn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
                            </svg>
                        </button>
                        <div class="breadcrumb" id="breadcrumb">
                            <span class="breadcrumb-item">Home</span>
                        </div>
                    </div>
                    <div class="toolbar-right">
                        <span class="toolbar-label">Icon Size</span>
                        <input type="range" id="icon-size-range" min="16" max="32" value="24">
                    </div>
                </div>
                <div class="explorer-content" id="explorer-content">
                    <table class="file-table">
                        <thead>
                            <tr>
                                <th class="col-name">Name</th>
                                <th class="col-type">Type</th>
                                <th class="col-size">Size</th>
                            </tr>
                        </thead>
                        <tbody id="file-table-body">
                            <!-- Files will be rendered here -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Tags Panel -->
            <aside class="tags-panel">
                <div class="panel-header">
                    <h3>Properties</h3>
                    <div class="tag-status" id="tag-status">No file selected</div>
                </div>
                <div class="panel-content" id="panel-content">
                    <div class="empty-state">
                        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <line x1="10" y1="9" x2="8" y2="9"></line>
                        </svg>
                        <p>Select a music file to view tags</p>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <!-- Context Menu -->
    <div class="context-menu" id="context-menu">
        <div class="context-item" data-action="mkdir">
            <svg class="ctx-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                <line x1="12" y1="11" x2="12" y2="17"></line>
                <line x1="9" y1="14" x2="15" y2="14"></line>
            </svg>
            <span>New Folder</span>
        </div>
        <div class="context-item" data-action="rename">
            <svg class="ctx-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
            <span>Rename</span>
        </div>
    </div>

    <!-- Modal Dialog -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-dialog" id="modal-dialog">
            <div class="modal-header">
                <div class="modal-title" id="modal-title">Dialog</div>
                <button class="modal-close" id="modal-close">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="modal-body">
                <input type="text" class="modal-input" id="modal-input" placeholder="Enter value...">
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
                <button class="btn btn-primary" id="modal-ok">OK</button>
            </div>
        </div>
    </div>

    <!-- Upload Progress Bar -->
    <div class="upload-progress-container" id="upload-progress-container">
        <div class="upload-progress-header">
            <div class="upload-progress-title">
                <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <span id="upload-progress-text">Uploading files...</span>
            </div>
            <button class="upload-close-btn" id="upload-close-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <div class="upload-progress-bar">
            <div class="upload-progress-fill" id="upload-progress-fill"></div>
        </div>
        <div class="upload-progress-details" id="upload-progress-details">0 / 0 files</div>
    </div>

    <!-- Drop Overlay -->
    <div class="drop-overlay" id="drop-overlay">
        <div class="drop-content">
            <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <p>Drop files here to upload</p>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
